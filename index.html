<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Animation with Message</title>
<style>
html, body {
  margin:0; padding:0; overflow:hidden;
  background: radial-gradient(circle at center,#12050a 0%,#050507 70%,#000 100%);
  font-family:sans-serif; height:100%;
}
canvas {
  display:none; width:100vw; height:100vh;
}
#countdown {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size: calc(60px + 10vw);
  color: #ff4b7d;
  text-shadow:0 0 20px #ff4b7d,0 0 40px #ff1a66;
  z-index:10;
}
.hint {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  color: rgba(255,80,120,0.8);
  font-size:14px; display:none;
}
#heartMessage {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:calc(20px + 5vw);
  color:#ff4b7d;
  text-shadow: 0 0 15px #ff4b7d, 0 0 25px #ff1a66, 0 0 35px #ff4b7d;
  display:none; text-align:center;
  pointer-events:none;
  z-index:15;
}
</style>
</head>
<body>

<div id="countdown">3</div>
<canvas id="canvas"></canvas>
<div class="hint">iloveu</div>
<div id="heartMessage">I WANNA BE YOURS</div>

<script>
/* ===== COUNTDOWN ===== */
let count=3;
const cd=document.getElementById("countdown");
const timer=setInterval(()=>{
  count--;
  if(count>0) cd.innerText=count;
  else {
    clearInterval(timer);
    cd.style.display="none";
    document.getElementById("canvas").style.display="block";
    document.querySelector(".hint").style.display="block";
    startAnimation();
  }
},1000);

/* ===== HEART ANIMATION ===== */
function startAnimation() {
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let w,h,cx,cy;

function resize(){
  w=window.innerWidth; h=window.innerHeight;
  cx=w/2; cy=h/2;
  canvas.width=w*(window.devicePixelRatio||1);
  canvas.height=h*(window.devicePixelRatio||1);
  ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
}
resize();
window.addEventListener("resize",resize);

function heartPoint(t,scale=1){
  const x=16*Math.pow(Math.sin(t),3);
  const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x:x*scale, y:-y*scale};
}

const particles=[], sparks=[], floatingHearts=[];
class Particle{constructor(angle){this.baseAngle=angle;this.size=Math.random()*2+1;this.alpha=Math.random()*0.6+0.3;this.offset=Math.random()*Math.PI*2;} draw(t){const pulse=1+Math.sin(t*0.003+this.offset)*0.08; const p=heartPoint(this.baseAngle,(11+Math.sin(t*0.004+this.offset))*pulse); const x=cx+p.x; const y=cy+p.y; ctx.beginPath(); ctx.fillStyle=`rgba(255,40,90,${this.alpha})`; ctx.shadowBlur=14; ctx.shadowColor="rgba(255,20,80,0.9)"; ctx.arc(x,y,this.size,0,Math.PI*2); ctx.fill();}}
class Spark{constructor(x,y){const a=Math.random()*Math.PI*2; const speed=Math.random()*2+0.5; this.x=x; this.y=y; this.vx=Math.cos(a)*speed; this.vy=Math.sin(a)*speed; this.life=1; this.decay=Math.random()*0.02+0.01; this.size=Math.random()*2+1;} update(){this.x+=this.vx; this.y+=this.vy; this.vx*=0.99; this.vy*=0.99; this.life-=this.decay;} draw(){ctx.beginPath(); ctx.fillStyle=`rgba(255,60,110,${this.life})`; ctx.shadowBlur=12; ctx.shadowColor="rgba(255,40,100,0.9)"; ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();}}
class FloatingHeart{constructor(){this.reset();} reset(){this.x=Math.random()*w; this.y=h+Math.random()*100; this.speed=Math.random()*0.7+0.3; this.size=Math.random()*12+10; this.alpha=Math.random()*0.5+0.3;} update(){this.y-=this.speed; this.x+=Math.sin(this.y*0.02)*0.5; if(this.y<-20) this.reset();} draw(){ctx.save(); ctx.translate(this.x,this.y); ctx.scale(this.size/10,this.size/10); ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(0,-3,-5,-3,-5,0); ctx.bezierCurveTo(-5,3,0,6,0,8); ctx.bezierCurveTo(0,6,5,3,5,0); ctx.bezierCurveTo(5,-3,0,-3,0,0); ctx.fillStyle=`rgba(255,100,140,${this.alpha})`; ctx.shadowBlur=10; ctx.shadowColor="rgba(255,100,140,0.8)"; ctx.fill(); ctx.restore();}}
for(let i=0;i<900;i++) particles.push(new Particle((i/900)*Math.PI*2));
for(let i=0;i<40;i++) floatingHearts.push(new FloatingHeart());
function burst(x,y,count=20){for(let i=0;i<count;i++) sparks.push(new Spark(x,y));}
function autoBurst(){const a=Math.random()*Math.PI*2; const p=heartPoint(a,11.5); burst(cx+p.x, cy+p.y, 14);}
setInterval(autoBurst,180);

function drawGlowHeart(t){
ctx.save(); ctx.translate(cx,cy); const pulse=1+Math.sin(t*0.004)*0.04; ctx.scale(pulse,pulse);
ctx.beginPath();
for(let i=0;i<=360;i++){const a=(i/180)*Math.PI; const p=heartPoint(a,11.5); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
ctx.closePath();
ctx.shadowBlur=45; ctx.shadowColor="rgba(255,0,80,0.55)";
ctx.strokeStyle="rgba(255,30,100,0.2)"; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
}

function animate(ts){
ctx.clearRect(0,0,w,h);
for(const hrt of floatingHearts){hrt.update(); hrt.draw();}
drawGlowHeart(ts);
for(const p of particles)p.draw(ts);
for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.update(); s.draw(); if(s.life<=0)sparks.splice(i,1);}
requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

const heartMsg = document.getElementById("heartMessage");

function handleTouch(x,y){
burst(x,y,28);
heartMsg.style.display="block";
setTimeout(()=>{heartMsg.style.display="none";},2000);
}

window.addEventListener("click",e=>{handleTouch(e.clientX,e.clientY);});
window.addEventListener("touchstart",e=>{for(const t of e.touches) handleTouch(t.clientX,t.clientY);},{passive:true});

}
</script>

</body>
</html>
